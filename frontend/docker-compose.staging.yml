services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.staging
    image: ptb-ot-frontend:staging
    container_name: ptb-ot-frontend
    command: npm run dev -- --host 0.0.0.0 --port 3334
    restart: unless-stopped
    env_file:
      - .env.staging
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      # Mount the whole project for live reload
      - ./:/app
      # Keep node_modules inside the container to avoid host conflicts
      - /app/node_modules
    networks:
      - new-frontend-network

  nginx:
    image: nginx:1.25-alpine
    container_name: ptb-ot-frontend-nginx
    depends_on:
      - frontend
    ports:
      - "3333:3333"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - new-frontend-network

networks:
  new-frontend-network:
    driver: bridge
